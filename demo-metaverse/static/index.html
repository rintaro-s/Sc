<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CR-Bridge — ATP Demo Metaverse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06060f;color:#d0d0e8;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:rgba(10,10,28,0.97);border-bottom:1px solid #1e1e48;height:48px;flex-shrink:0;}
#hdr h1{font-size:1rem;font-weight:700;color:#7ef7ff;letter-spacing:1px;}
.badge{font-size:.6rem;background:#111133;border:1px solid #3333aa;border-radius:4px;padding:2px 6px;color:#6677cc;margin-left:6px;}
#ws-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff4444;margin-right:6px;transition:background .4s;}
#ws-dot.ok{background:#44ff88;}#ws-dot.try{background:#ffaa22;}
#fps-label{font-size:.65rem;color:#444466;margin-left:10px;}
#scenes{display:flex;flex:1;gap:2px;padding:4px;overflow:hidden;}
.scene-wrap{flex:1;position:relative;border-radius:8px;overflow:hidden;border:1px solid rgba(50,50,120,.5);}
canvas{display:block;width:100%;height:100%;}
.side-title{position:absolute;top:8px;left:8px;padding:3px 10px;border-radius:5px;font-size:.72rem;font-weight:700;pointer-events:none;z-index:2;}
.side-title.naive{background:rgba(220,50,50,.85);color:#fff;}
.side-title.crb{background:rgba(60,200,180,.9);color:#000;}
.loss-overlay{position:absolute;inset:0;pointer-events:none;border-radius:8px;z-index:1;border:2px solid transparent;transition:border-color .15s;}
.loss-overlay.active{border-color:rgba(255,60,60,.7);}
.avatar-list{position:absolute;top:8px;right:8px;font-size:.62rem;line-height:1.7;pointer-events:none;z-index:2;background:rgba(0,0,0,.45);border-radius:6px;padding:4px 8px;max-width:160px;}
#bar{display:flex;align-items:center;gap:12px;padding:6px 14px;background:rgba(8,8,22,.97);border-top:1px solid #1e1e48;height:64px;flex-shrink:0;overflow-x:auto;}
.ctrl{display:flex;flex-direction:column;gap:2px;white-space:nowrap;}
.ctrl label{font-size:.6rem;text-transform:uppercase;color:#6677aa;letter-spacing:.5px;}
.ctrl .row{display:flex;align-items:center;gap:6px;}
input[type=range]{-webkit-appearance:none;appearance:none;width:130px;height:4px;border-radius:2px;outline:none;cursor:pointer;
  background:linear-gradient(to right,#ff5555 var(--v,20%),#1e1e48 var(--v,20%));}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#ff5555;cursor:pointer;}
.val{font-size:.78rem;font-weight:700;color:#ff7777;width:30px;}
.btn{border:1px solid;background:transparent;cursor:pointer;font-size:.7rem;font-weight:600;border-radius:5px;padding:4px 10px;transition:all .15s;}
.btn-r{color:#ff9944;border-color:#ff9944;}.btn-r:hover{background:#ff9944;color:#000;}
.btn-g{color:#44ddaa;border-color:#44ddaa;}.btn-g:hover{background:#44ddaa;color:#000;}
.divider{width:1px;height:40px;background:#1e1e48;flex-shrink:0;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px;}
.sg{display:flex;flex-direction:column;}
.sg .k{font-size:.56rem;color:#556688;text-transform:uppercase;}
.sg .v{font-size:.85rem;font-weight:700;}
.v.red{color:#ff5555;}.v.green{color:#44ee88;}.v.teal{color:#44ccbb;}.v.yellow{color:#ffbb44;}
.legend{display:flex;flex-direction:column;gap:3px;}
.li{display:flex;align-items:center;gap:5px;font-size:.64rem;}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ll{width:18px;height:3px;border-radius:2px;flex-shrink:0;}
</style>
</head>
<body>
<div id="hdr">
  <div style="display:flex;align-items:center">
    <h1>CR-Bridge</h1>
    <span class="badge">ATP v1</span>
    <span class="badge">テレポート防止デモ</span>
  </div>
  <div style="display:flex;align-items:center">
    <span id="ws-dot"></span>
    <span id="ws-label" style="font-size:.7rem;color:#6677aa">接続中...</span>
    <span id="fps-label">-- fps</span>
  </div>
</div>
<div id="scenes">
  <div class="scene-wrap">
    <canvas id="cv-naive"></canvas>
    <div class="side-title naive">&#9889; 素朴実装（パケットロスでテレポート）</div>
    <div class="loss-overlay" id="loss-naive"></div>
    <div class="avatar-list" id="av-naive"></div>
  </div>
  <div class="scene-wrap">
    <canvas id="cv-crb"></canvas>
    <div class="side-title crb">&#10024; CR-Bridge ATP（EKF 慣性予測）</div>
    <div class="loss-overlay" id="loss-crb"></div>
    <div class="avatar-list" id="av-crb"></div>
  </div>
</div>
<div id="bar">
  <div class="ctrl">
    <label>パケットロス率</label>
    <div class="row">
      <input type="range" id="loss-sl" min="0" max="100" value="20" oninput="onLoss(this.value)"/>
      <span class="val" id="loss-v">20%</span>
    </div>
    <div class="row" style="margin-top:2px">
      <button class="btn btn-r" onclick="doReset()">リセット</button>
      <button class="btn btn-g" onclick="doAdd()">+ アバター</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="stat-grid">
    <div class="sg"><span class="k">テレポート数(素朴)</span><span class="v red" id="s-tp">0</span></div>
    <div class="sg"><span class="k">EKF 防止数</span><span class="v green" id="s-ekf">0</span></div>
    <div class="sg"><span class="k">素朴 平均誤差</span><span class="v red" id="s-ne">0.0u</span></div>
    <div class="sg"><span class="k">CR-Bridge 誤差</span><span class="v teal" id="s-ce">0.0u</span></div>
    <div class="sg"><span class="k">ロス率</span><span class="v yellow" id="s-lp">20%</span></div>
    <div class="sg"><span class="k">アバター</span><span class="v" id="s-av">0</span></div>
  </div>
  <div class="divider"></div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:#888;border:2px dashed #555;box-sizing:border-box;"></div>真の位置(ghost)</div>
    <div class="li"><div class="ld" style="background:#ff5555;"></div>素朴実装</div>
    <div class="li"><div class="ld" style="background:#44ccbb;"></div>CR-Bridge</div>
    <div class="li"><div class="ll" style="background:#4444aa;"></div>SNS 投稿</div>
  </div>
</div>
<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const TRAIL_MAX = 100;
const FLASH_FRAMES = 20;
const AV_R = 5, AV_H = 12;

function mkScene(canvasId, accentHex) {
  const canvas = document.getElementById(canvasId);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06060f);
  scene.fog = new THREE.FogExp2(0x06060f, 0.0015);

  const camera = new THREE.PerspectiveCamera(55, 1, 0.5, 3000);
  camera.position.set(0, 200, 500);
  camera.lookAt(0, 0, 0);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true; controls.dampingFactor = 0.06;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.4;
  controls.maxPolarAngle = Math.PI * 0.44;
  controls.minDistance = 50; controls.maxDistance = 1500;

  scene.add(new THREE.AmbientLight(0x202040, 1.5));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(150, 400, 200); sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = sun.shadow.camera.bottom = -600;
  sun.shadow.camera.right = sun.shadow.camera.top = 600;
  sun.shadow.camera.far = 1500;
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(accentHex, 0x050508, 0.6));

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(1400, 1400),
    new THREE.MeshStandardMaterial({ color: 0x040410, roughness: 1 })
  );
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  scene.add(floor);

  const grid = new THREE.GridHelper(1400, 56, accentHex, 0x111130);
  grid.material.opacity = 0.5; grid.material.transparent = true;
  scene.add(grid);

  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(420, 1.5, 4, 80),
    new THREE.MeshBasicMaterial({ color: accentHex, transparent: true, opacity: 0.25 })
  );
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);

  return { renderer, scene, camera, controls, canvas };
}

const sideN = mkScene('cv-naive', 0xff3333);
const sideC = mkScene('cv-crb', 0x33ddcc);

function resize() {
  for (const side of [sideN, sideC]) {
    const w = side.canvas.clientWidth, h = side.canvas.clientHeight;
    if (side.canvas.width !== w || side.canvas.height !== h) {
      side.renderer.setSize(w, h, false);
      side.camera.aspect = w / h;
      side.camera.updateProjectionMatrix();
    }
  }
}
new ResizeObserver(resize).observe(document.getElementById('scenes'));
resize();

function mkCapsule(hexColor) {
  const group = new THREE.Group();
  const color = new THREE.Color(hexColor);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.35, roughness: 0.35, metalness: 0.2
  });
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(AV_R, AV_H, 4, 10), mat);
  body.position.y = AV_R + AV_H / 2; body.castShadow = true;
  group.add(body);
  const light = new THREE.PointLight(color, 2.0, 80);
  light.position.y = AV_R + AV_H / 2;
  group.add(light);
  group._mat = mat; group._light = light; group._color = color.clone(); group._flash = 0;
  return group;
}

function mkTrail(hexColor) {
  const buf = new Float32Array(TRAIL_MAX * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
  geo.setDrawRange(0, 0);
  const line = new THREE.Line(geo,
    new THREE.LineBasicMaterial({ color: new THREE.Color(hexColor), opacity: 0.5, transparent: true })
  );
  line._buf = buf; line._cnt = 0;
  return line;
}

function appendTrail(t, x, y, z) {
  if (t._cnt < TRAIL_MAX) {
    t._buf[t._cnt*3]=x; t._buf[t._cnt*3+1]=y; t._buf[t._cnt*3+2]=z;
    t._cnt++; t.geometry.setDrawRange(0, t._cnt);
  } else {
    t._buf.copyWithin(0, 3);
    const i=(TRAIL_MAX-1)*3; t._buf[i]=x; t._buf[i+1]=y; t._buf[i+2]=z;
  }
  t.geometry.attributes.position.needsUpdate = true;
}

function mkLabel(text, hexColor) {
  const c = document.createElement('canvas'); c.width=256; c.height=52;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.roundRect(2, 2, 252, 48, 8); ctx.fill();
  ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = hexColor;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text.slice(0,14), 128, 26);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
  spr.scale.set(52, 11, 1);
  return spr;
}

function mkSNSOrb(text) {
  const grp = new THREE.Group();
  grp.add(new THREE.Mesh(new THREE.SphereGeometry(8,10,10),
    new THREE.MeshStandardMaterial({ color:0x4444cc, emissive:0x2222aa, emissiveIntensity:0.8, transparent:true, opacity:0.7 })));
  const ring = new THREE.Mesh(new THREE.TorusGeometry(14,1.2,6,20),
    new THREE.MeshBasicMaterial({ color:0x6666ff, transparent:true, opacity:0.5 }));
  ring.rotation.x = -Math.PI/2; grp.add(ring);
  grp.add(new THREE.PointLight(0x4444ff, 1, 100));
  const lbl = mkLabel(text, '#8888ff'); lbl.position.y = 26; grp.add(lbl);
  return grp;
}

const ents = new Map(), snsOrbs = new Map();

function spawnAvatar(id, name, color) {
  const grpN=mkCapsule(color), grpC=mkCapsule(color);
  const tN=mkTrail(color), tC=mkTrail(color);
  const lblN=mkLabel(name,color), lblC=mkLabel(name,color);
  const yLbl = AV_R*2+AV_H+6;
  lblN.position.y = yLbl; lblC.position.y = yLbl;
  const ghost = new THREE.Mesh(
    new THREE.CapsuleGeometry(AV_R+1.5, AV_H, 4, 10),
    new THREE.MeshBasicMaterial({ color:new THREE.Color(color), wireframe:true, transparent:true, opacity:0.18 })
  );
  ghost.position.y = AV_R + AV_H/2;
  sideN.scene.add(grpN, tN, lblN, ghost);
  sideC.scene.add(grpC, tC, lblC);
  const ent = { grpN, grpC, tN, tC, lblN, lblC, ghost, lastTp:0 };
  ents.set(id, ent);
  return ent;
}

function spawnSNS(post, side) {
  const key = post.id + '_' + (side===sideN?'N':'C');
  if (snsOrbs.has(key)) return;
  const orb = mkSNSOrb(post.text);
  orb.position.set(post.position.x, 8, post.position.z);
  side.scene.add(orb); snsOrbs.set(key, orb);
}

function updateScene(frame) {
  for (const p of frame.sns_posts) { spawnSNS(p, sideN); spawnSNS(p, sideC); }
  let lossCount = 0;
  for (const av of frame.avatars) {
    let ent = ents.get(av.id);
    if (!ent) ent = spawnAvatar(av.id, av.name, av.color);
    const np=av.naive_position, cp=av.crbridge_position, tp=av.true_position;
    const yLbl = np.y + AV_R*2+AV_H+6;

    ent.grpN.position.set(np.x, np.y, np.z);
    appendTrail(ent.tN, np.x, np.y, np.z);
    ent.lblN.position.set(np.x, yLbl, np.z);
    ent.ghost.position.set(tp.x, tp.y, tp.z);

    if (av.naive_teleport_count > ent.lastTp) {
      ent.lastTp = av.naive_teleport_count;
      ent.grpN._flash = FLASH_FRAMES;
    }
    if (ent.grpN._flash > 0) {
      ent.grpN._mat.emissive.setHex(0xff1100);
      ent.grpN._mat.emissiveIntensity = 1.2;
      ent.grpN._flash--;
    } else {
      ent.grpN._mat.emissive.copy(ent.grpN._color);
      ent.grpN._mat.emissiveIntensity = 0.35;
    }

    if (av.in_packet_loss) {
      ent.grpN._mat.opacity = 0.28; ent.grpN._mat.transparent = true;
      ent.grpN._light.intensity = 0.2; lossCount++;
    } else {
      ent.grpN._mat.opacity = 1; ent.grpN._mat.transparent = false;
      ent.grpN._light.intensity = 2.0;
    }

    ent.grpC.position.set(cp.x, cp.y, cp.z);
    appendTrail(ent.tC, cp.x, cp.y, cp.z);
    ent.lblC.position.set(cp.x, cp.y+AV_R*2+AV_H+6, cp.z);
    ent.grpC._mat.opacity = 1; ent.grpC._mat.transparent = false;
    ent.grpC._light.intensity = 2.0;
  }
  document.getElementById('loss-naive').classList.toggle('active', lossCount > 0);
}

function updateAvatarList(frame) {
  let hN='', hC='';
  for (const av of frame.avatars) {
    const c=av.color, li=av.in_packet_loss?' [LOSS]':'';
    hN += '<div style="color:'+c+'">'+av.name+li+' <span style="color:#ff5555">tp:'+av.naive_teleport_count+'</span> <span style="color:#888">e:'+av.naive_error.toFixed(0)+'</span></div>';
    hC += '<div style="color:'+c+'">'+av.name+' <span style="color:#44ee88">e:'+av.crbridge_error.toFixed(0)+'</span></div>';
  }
  document.getElementById('av-naive').innerHTML = hN;
  document.getElementById('av-crb').innerHTML = hC;
}

function updateStats(frame) {
  const s = frame.stats;
  document.getElementById('s-tp').textContent  = s.total_naive_teleports;
  document.getElementById('s-ekf').textContent = s.total_ekf_prevented;
  document.getElementById('s-ne').textContent  = s.avg_naive_error.toFixed(1)+'u';
  document.getElementById('s-ce').textContent  = s.avg_crbridge_error.toFixed(1)+'u';
  document.getElementById('s-lp').textContent  = s.packet_loss_pct.toFixed(1)+'%';
  document.getElementById('s-av').textContent  = frame.avatars.length;
}

let ws=null, lastFrame=null;
function connect() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(proto+'://'+location.host+'/ws');
  ws.onopen  = () => { document.getElementById('ws-dot').className='ok'; document.getElementById('ws-label').textContent='接続済み'; };
  ws.onclose = () => { document.getElementById('ws-dot').className='try'; document.getElementById('ws-label').textContent='再接続中...'; setTimeout(connect,1500); };
  ws.onmessage = e => { try { lastFrame=JSON.parse(e.data); } catch(_){} };
}
connect();

function send(o) { if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
window.onLoss = v => {
  const p=+v; document.getElementById('loss-v').textContent=p+'%';
  document.getElementById('loss-sl').style.setProperty('--v',p+'%');
  send({action:'set_packet_loss',rate:p/100});
};
window.doReset = () => send({action:'reset'});
window.doAdd   = () => send({action:'add_avatar'});
document.getElementById('loss-sl').style.setProperty('--v','20%');

function animateSNS(dt) {
  snsOrbs.forEach(orb => { orb.rotation.y+=dt*0.6; orb.children[1].rotation.z+=dt*0.4; });
}

let lastT=0, fFr=0, fLast=0;
function animate(ts) {
  requestAnimationFrame(animate);
  const dt=(ts-lastT)/1000; lastT=ts;
  sideN.controls.update(); sideC.controls.update();
  animateSNS(dt);
  if (lastFrame) {
    updateScene(lastFrame); updateAvatarList(lastFrame); updateStats(lastFrame);
    lastFrame=null;
  }
  resize();
  sideN.renderer.render(sideN.scene, sideN.camera);
  sideC.renderer.render(sideC.scene, sideC.camera);
  fFr++;
  if (ts-fLast>=1000) {
    document.getElementById('fps-label').textContent=Math.round(fFr*1000/(ts-fLast))+' fps';
    fFr=0; fLast=ts;
  }
}
requestAnimationFrame(animate);
</script>
</body>
</html>
